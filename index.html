<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Plataforma IGI · Ecuador</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0eff5;color:#1a1a1a;font-size:14px}
.nav{background:#1a1060;padding:10px 16px;position:sticky;top:0;z-index:100}
.nav-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.nav-title{color:#fff;font-weight:500;font-size:14px;flex:1}
.nav-btns{display:flex;gap:4px;flex-wrap:wrap}
.nav-btn{padding:5px 11px;border-radius:6px;border:none;background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-size:11px}
.nav-btn.active{background:#FFD700;color:#1a1060;font-weight:600}
.main{max-width:980px;margin:0 auto;padding:1rem}
.card{background:#fff;border:1px solid #eee;border-radius:10px;padding:14px 16px;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.kpi{background:#fff;border:1px solid #eee;border-radius:10px;padding:12px;text-align:center}
.kpi-lbl{font-size:10px;color:#888;margin-bottom:3px}
.kpi-val{font-size:22px;font-weight:500}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:500}
.tabs{display:flex;gap:2px;border-bottom:1px solid #eee;margin-bottom:12px;flex-wrap:wrap}
.tab-btn{padding:7px 14px;border:none;background:none;cursor:pointer;font-size:13px;border-bottom:2px solid transparent;color:#666}
.tab-btn.active{border-bottom-color:#534AB7;color:#534AB7}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f5f4fb;color:#534AB7;padding:7px 8px;text-align:left;font-weight:500;font-size:11px;white-space:nowrap}
td{padding:6px 8px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
input[type=number]{width:58px;padding:3px 6px;border:1px solid #ddd;border-radius:6px;text-align:center;font-size:13px}
input[type=text],input[type=date],input[type=time],textarea,select{width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff}
label{font-size:11px;color:#888;display:block;margin-bottom:3px}
.field{margin-bottom:8px}
.btn{padding:6px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:500}
.btn-p{background:#534AB7;color:#fff}
.btn-o{background:#fff;color:#534AB7;border:1px solid #534AB7}
.btn-sm{padding:3px 10px;font-size:11px}
.btn-danger{background:#fff;color:#c00;border:1px solid #eee;padding:5px 9px;border-radius:6px;cursor:pointer;font-size:12px}
.ag-btn{padding:5px 8px;border-radius:7px;cursor:pointer;font-size:11px;min-width:88px;text-align:center;border:2px solid transparent}
.minibar{height:5px;background:#eee;border-radius:3px;margin-top:3px;overflow:hidden}
.minibar-fill{height:5px;border-radius:3px;transition:width .3s}
.eje-hdr{font-size:12px;font-weight:500;margin:12px 0 6px;display:flex;justify-content:space-between;align-items:center;padding-bottom:4px;border-bottom:1px solid}
.eje-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:4px}
.eje-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;font-size:12px}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:9999;padding:12px}
.modal{background:#fff;border-radius:14px;width:100%;max-width:720px;max-height:90vh;overflow:auto;padding:1.5rem}
.sync{font-size:11px;padding:2px 8px;border-radius:10px}
.sync-ok{background:#e8f5e9;color:#1a5e20}
.sync-pend{background:#fff8e1;color:#7c4a00}
.sync-err{background:#ffebee;color:#8b0000}
.alert-item{background:#ffebee;border:1px solid #ffcdd2;border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.plan-item{background:#fafafa;border:1px solid #eee;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.visita-card{background:#fff;border:1px solid #e0dff8;border-radius:10px;padding:14px;margin-bottom:10px}
.visita-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:10px 14px;background:#f5f4fb;border-radius:8px}
.visita-header:hover{background:#eeedfc}
.visita-body{padding-top:12px}
.seccion{background:#f9f9ff;border-radius:8px;padding:12px;margin-bottom:10px;border-left:3px solid #534AB7}
.seccion-verde{border-left-color:#0F6E56;background:#f6fff9}
.seccion-naranja{border-left-color:#85370D;background:#fff8f5}
.seccion-amarilla{border-left-color:#7c4a00;background:#fffdf0}
.sec-title{font-size:12px;font-weight:600;margin-bottom:8px;color:#534AB7}
.sec-title-verde{color:#0F6E56}
.sec-title-naranja{color:#85370D}
.sec-title-amarilla{color:#7c4a00}
.check-item{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px}
.check-item input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0}
.ritual-box{background:#fffdf0;border:1px solid #f0e68c;border-radius:8px;padding:12px;margin-bottom:10px}
.ritual-num{width:24px;height:24px;border-radius:50%;background:#534AB7;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;margin-right:6px;flex-shrink:0}
.compromiso-row{display:grid;grid-template-columns:2fr 2fr 1fr;gap:6px;margin-bottom:6px;align-items:center}
/* DIRECTOR ESTRATÉGICO */
.informe-section{background:#fff;border:1px solid #e0dff8;border-radius:10px;padding:16px;margin-bottom:14px}
.informe-title{font-size:14px;font-weight:600;color:#1a1060;margin-bottom:12px;display:flex;align-items:center;gap:8px;border-bottom:2px solid #EEEDFE;padding-bottom:8px}
.zona-card{background:#fafafa;border:1px solid #eee;border-radius:8px;padding:12px;margin-bottom:8px}
.zona-card-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.retro-box{background:#f0f4ff;border:1px solid #c7d7fb;border-radius:8px;padding:12px;margin-top:8px}
.agenda-item{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f0f0f0}
.agenda-num{width:24px;height:24px;border-radius:50%;background:#1a1060;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:1px}
.cadencia-card{border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid}
.ia-loading{display:flex;align-items:center;gap:10px;padding:1.5rem;background:#f5f4fb;border-radius:8px;color:#534AB7;font-size:13px}
.semaforo-bar{height:8px;border-radius:4px;margin-top:4px;overflow:hidden;display:flex}
@media(max-width:600px){.grid2,.grid3,.grid4,.grid5{grid-template-columns:1fr 1fr}.eje-grid{grid-template-columns:1fr}.compromiso-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-top">
    <div class="nav-title">📊 Plataforma IGI · Ecuador</div>
    <span id="sync-badge" class="sync sync-ok">✓ Listo</span>
    <button style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px" onclick="toggleMenu()">☰ Menú</button>
  </div>
  <div class="nav-btns" id="nav-btns" style="display:none">

    <button class="nav-btn" id="btn-l10" onclick="goVista('lider',10)">Ivan D. Sanchez</button>
  </div>
</div>
<div class="main" id="app"></div>

<!-- MODAL IA -->
<div id="modal-ia" class="modal-ov" style="display:none">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div><div style="font-size:15px;font-weight:500;color:#1a1060" id="modal-ia-title">Análisis IA</div><div id="modal-ia-sub" style="font-size:12px;color:#888"></div></div>
      <button onclick="document.getElementById('modal-ia').style.display='none'" style="border:none;background:none;font-size:22px;cursor:pointer;color:#888">✕</button>
    </div>
    <div id="modal-ia-body" style="font-size:13px;line-height:1.75;white-space:pre-wrap;color:#222"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// CONFIGURACIÓN
// ══════════════════════════════════════════════════════
const JSONBIN_API_KEY = "$2a$10$KGYkOVGllAacjYcGcQTW/uxeTJinwORe5bRNVGe6IMaN4z8ED2Xnu";
const JSONBIN_BIN_ID  = "6a010195c0954111d80497df";

const LIDERES=[
  {id:1,n:"Harol Bedoya",z:"Zona Norte"},
  {id:2,n:"Oswaldo Rincon",z:"Zona Sur"},
  {id:3,n:"Pablo Hernandez",z:"Zona Centro"},
  {id:4,n:"Alfredo Segura",z:"Zona Centro Norte"},
  {id:5,n:"Jefferson Luna",z:"Zona Quito Sur"},
  {id:6,n:"Jorge Higuita",z:"Zona Quito Norte"},
  {id:7,n:"Wilmar Sanchez",z:"Zona Ambato"},
  {id:8,n:"Atilio Manzano",z:"Zona Machala"},
  {id:9,n:"Efren Londoño",z:"Zona Portoviejo"},
  {id:10,n:"Ivan Dario Sanchez",z:"Zona Esmeraldas"},
];
const AGENCIAS={
  1:[["E-46","Oasis"],["E-09","Entre Rios"],["E-44","Plaza Tía Bastion"],["E-50","Plaza Tía Duran"],["E-21","Aurora"],["E-22","Instantanea"],["E-32",'La "9"'],["E-02","Milagro"],["E-25","La Fe"],["E-14","La Oferta"]],
  2:[["E-11","Del Sur"],["E-49","Blue Coast"],["E-38","La 38"],["E-35","Oro Sur"],["E-16","La 17"],["E-27","La Floresta"],["E-18","La Libertad"],["E-109","La Perla"],["E-110","Cuenca"]],
  3:[["E-06","Costa de Oro"],["E-04","Sol de Oro"],["E-08","La Favorita"],["E-36","9 de Octubre"],["E-39","Boyacá"],["E-01","Guayaquil"],["E-03","Dinero Ya"],["E-10","Babahoyo"],["E-19","Ventanas"],["E-30","La 27"]],
  4:[["E-23","San Marin"],["E-24","Urdesa"],["E-29","Plaza Triángulo"],["E-48","La Rotonda"],["E-05","El Dólar"],["E-34","Albocentro"],["E-12","Daule"],["E-13","Vinces"],["E-15","El Empalme"],["E-28","El Registro"]],
  5:[["E-55","Capital"],["E-56","Atahualpa"],["E-58","El Pintado"],["E-59","Mariscal"],["E-68","El Recreo"],["E-70","San Rafael"],["E-71","Sangolqui"],["E-72","Solanda 1"],["E-100","Latacunga"]],
  6:[["E-51","La Provincia"],["E-52","Quito"],["E-53","Centro Financiero"],["E-54","Alameda"],["E-61","Aeropuerto"],["E-62","Cumbaya"],["E-63","Central"],["E-65","Tulcan"],["E-66","Amazonas"],["E-33","Condado"],["E-67","La Prensa"]],
  7:[["E-57","Faraon"],["E-60","El Coca"],["E-64","Lago Agrio"],["E-101","Ambato"],["E-102","Monarca"],["E-104","Riobamba"],["E-106","Tena"],["E-107","Cacique"],["E-108","Teatro"],["E-69","Shushufindi"]],
  8:[["E-111","Loja"],["E-112","La Moneda"],["E-113","Naranjal"],["E-114","Huquillas"],["E-115","El Oro"],["E-116","Fortuna"],["E-117","Mi Tio"],["E-119","Machala"],["E-121","Super Efectiva"],["E-120","Catamayo"]],
  9:[["E-26","Jipijapa"],["E-159","Chone"],["E-160","Portoviejo"],["E-161","Manabita"],["E-162","Dollar"],["E-166","Reales Tamarindos"],["E-168","1 de Enero"],["E-171","Washingthon"],["E-172","Calceta"]],
  10:[["E-200","Bolívar"],["E-201","Las Palmas"],["E-202","Olmedo"],["E-203","La Mejor"],["E-204","La Moneda"],["E-205","La Solución"],["E-206","Quinindé"],["E-207","Don Billete"],["E-208","Ecuador"],["E-209","La Tolita"],["E-210","Costeñita"],["E-211","Codesa"],["E-212","San Lorenzo"]],
};
const EJE1=["Equipo","Liderazgo","Estrategia Local","Marketing / Activación","Imagen y Orden","Atención al Cliente"];
const EJE2=["Perfil de Cliente","Entorno","Dinámica Comercial","Riesgo","Potencial"];
const EJE3G=[
  {g:"A. Atención y Verbalización",v:["Verbalización del Contrato","Ofrecimiento de Servicios","Empatía y Solución"]},
  {g:"B. Imagen y Orden",v:["Limpieza del Local","Limpieza General","Vitrina Ordenada","Imagen Personal"]},
  {g:"C. Disciplina y Control",v:["Libros y Registros","Comunicación Oportuna","Conocimiento de Metas"]},
  {g:"D. Protocolos",v:["Apertura Puntual","Cumplimiento de Protocolos","Protocolos de Seguridad"]},
  {g:"E. Tareas Personalizadas",v:["Tarea Personalizada 1","Tarea Personalizada 2"]},
];
const EJE3=EJE3G.flatMap(g=>g.v);
const TV=EJE1.length+EJE2.length+EJE3.length;

let DB={};
let vista="director",lid=1,agI=0,tabL="eval",tabD="pulso";
let menuOpen=false,dbSaveTimer=null;

function mkAg(c,n){return{cod:c,nom:n,admin:"",eje1:Array(EJE1.length).fill(0),eje2:Array(EJE2.length).fill(0),eje3:Array(EJE3.length).fill(0),obs:"",accion:"",estrategia:"",fecha:""};}
function mkVisita(){return{id:Date.now(),fecha:new Date().toISOString().slice(0,10),hora_ini:"",hora_fin:"",objetivo:"",que_pasa:"",desafio:"",check:{visito:false,reviso_resultados:false,ejecuto_activacion:false,feedback:false,reconocio:false,detecto_brecha:false,dejo_tareas:false,pidio_evidencia:false,seguimiento_ant:false},decision:"",acciones:[{tema:"",decision:"",accion:"",responsable:"",fecha:"",estado:"Pendiente"}],reflexion:"",compromisos:[{compromiso:"",accion:"",estado:"Pendiente",evidencia:""}],ritual:{semana:"",dijimos:"",se_hizo:"",aprendimos:"",acuerdos:""},abierta:true};}
function mkZona(id){return{ags:AGENCIAS[id].map(([c,n])=>mkAg(c,n)),plan:[],obs:"",mes:new Date().toISOString().slice(0,7),visitas:{},retro_director:{},agenda_notas:""};}
function mkRetro(){return{fecha:new Date().toISOString().slice(0,10),fortalezas:"",oportunidades:"",compromisos_dir:"",meta_igi:"",estado:"Pendiente"};}
function initDB(){const d={};LIDERES.forEach(l=>{d[l.id]=mkZona(l.id);});return d;}

// ══ JSONBIN ══
function cfgOk(){return JSONBIN_API_KEY&&!JSONBIN_API_KEY.includes("PEGA")&&JSONBIN_BIN_ID&&!JSONBIN_BIN_ID.includes("PEGA");}
async function dbLoad(){
  if(!cfgOk()){try{const s=localStorage.getItem("igi_db");if(s)DB=JSON.parse(s);}catch{}LIDERES.forEach(l=>{if(!DB[l.id])DB[l.id]=mkZona(l.id);});return;}
  setSy("pend");
  try{const r=await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`,{headers:{"X-Master-Key":JSONBIN_API_KEY,"X-Bin-Meta":"false"}});const j=await r.json();if(j&&typeof j==="object"){DB=j;LIDERES.forEach(l=>{if(!DB[l.id])DB[l.id]=mkZona(l.id);});}setSy("ok");}catch{setSy("err");}
}
async function dbSave(){
  if(!cfgOk()){try{localStorage.setItem("igi_db",JSON.stringify(DB));}catch{}return;}
  setSy("pend");clearTimeout(dbSaveTimer);
  dbSaveTimer=setTimeout(async()=>{try{await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":JSONBIN_API_KEY},body:JSON.stringify(DB)});setSy("ok");}catch{setSy("err");}},1500);
}

// ══ CÁLCULOS ══
const pr=a=>{const v=a.filter(x=>x>0);return v.length?+(v.reduce((a,b)=>a+b,0)/v.length).toFixed(2):0;};
const igi=(e1,e2,e3)=>(e1>0&&e2>0&&e3>0)?+(e1*.4+e2*.25+e3*.35).toFixed(2):0;
function nv(v){if(!v)return{l:"Sin datos",c:"#888",bg:"#f5f5f5",s:"⬜"};if(v>=4)return{l:"Fuerte",c:"#1a5e20",bg:"#e8f5e9",s:"🟢"};if(v>=2.5)return{l:"Media",c:"#7c4a00",bg:"#fff8e1",s:"🟡"};return{l:"Débil",c:"#8b0000",bg:"#ffebee",s:"🔴"};}
function agSt(ag){const p1=pr(ag.eje1),p2=pr(ag.eje2),p3=pr(ag.eje3),t=igi(p1,p2,p3);return{p1,p2,p3,t,nv:nv(t)};}
function zonaSt(id){
  const d=DB[id];if(!d)return{avg:0,f:0,m:0,db:0,comp:0,e1:0,e2:0,e3:0,visitas_total:0,acciones_pend:0};
  const ss=d.ags.map(a=>agSt(a));const ig=ss.map(s=>s.t).filter(x=>x>0);
  const avg=ig.length?+(ig.reduce((a,b)=>a+b,0)/ig.length).toFixed(2):0;
  const done=d.ags.reduce((acc,a)=>acc+a.eje1.filter(x=>x>0).length+a.eje2.filter(x=>x>0).length+a.eje3.filter(x=>x>0).length,0);
  const e1v=ss.map(s=>s.p1).filter(x=>x>0),e2v=ss.map(s=>s.p2).filter(x=>x>0),e3v=ss.map(s=>s.p3).filter(x=>x>0);
  const vt=d.visitas?Object.values(d.visitas).reduce((a,v)=>a+v.length,0):0;
  const ap=d.visitas?Object.values(d.visitas).reduce((a,vs)=>a+vs.reduce((b,v)=>b+v.acciones.filter(ac=>ac.estado==="Pendiente").length,0),0):0;
  return{avg,f:ig.filter(x=>x>=4).length,m:ig.filter(x=>x>=2.5&&x<4).length,db:ig.filter(x=>x<2.5&&x>0).length,
    comp:Math.round((done/(TV*d.ags.length))*100),
    e1:e1v.length?+(e1v.reduce((a,b)=>a+b,0)/e1v.length).toFixed(2):0,
    e2:e2v.length?+(e2v.reduce((a,b)=>a+b,0)/e2v.length).toFixed(2):0,
    e3:e3v.length?+(e3v.reduce((a,b)=>a+b,0)/e3v.length).toFixed(2):0,
    visitas_total:vt,acciones_pend:ap};
}

// ══ HELPERS UI ══
function setSy(s){const el=document.getElementById("sync-badge");if(!el)return;if(s==="ok"){el.className="sync sync-ok";el.textContent="✓ Guardado";}else if(s==="pend"){el.className="sync sync-pend";el.textContent="⏳ Guardando...";}else{el.className="sync sync-err";el.textContent="⚠ Sin conexión";}}
const bdg=v=>{const n=nv(v);return`<span class="badge" style="background:${n.bg};color:${n.c}">${n.s} ${n.l}</span>`;};
const mbar=(v,mx=5)=>{const p=(v/mx)*100,n=nv(v);return`<div class="minibar"><div class="minibar-fill" style="width:${p}%;background:${n.c}"></div></div>`;};
const cv=v=>`<span style="background:${nv(v).bg};color:${nv(v).c};padding:1px 7px;border-radius:5px">${v||"—"}</span>`;
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function semFill(f,m,d,t){let h=`<div class="semaforo-bar"><div style="flex:${f||0};background:#e8f5e9"></div><div style="flex:${m||0};background:#fff8e1"></div><div style="flex:${d||0};background:#ffebee"></div>`;if(f+m+d<t)h+=`<div style="flex:${t-f-m-d};background:#f0f0f0"></div>`;h+=`</div>`;return h;}

// ══ NAVEGACIÓN ══
function toggleMenu(){menuOpen=!menuOpen;document.getElementById("nav-btns").style.display=menuOpen?"flex":"none";}
async function goVista(v,id){
  vista=v;if(id){lid=id;agI=0;tabL="eval";}
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById(v==="director"?"btn-dir":"btn-l"+lid)?.classList.add("active");
  await dbLoad();render();
  if(window.innerWidth<600){menuOpen=false;document.getElementById("nav-btns").style.display="none";}
}
function setTabD(t){tabD=t;render();}
function setTabL(t){tabL=t;render();}
function setAg(i){agI=i;render();}

// ══ MUTACIONES IGI ══
function updEje(eje,i,v){DB[lid].ags[agI][eje][i]=v;dbSave();renderIGIBox();}
function updAg(f,v){DB[lid].ags[agI][f]=v;dbSave();}

// ══ MUTACIONES VISITAS ══
function getVisitas(agCod){if(!DB[lid].visitas)DB[lid].visitas={};if(!DB[lid].visitas[agCod])DB[lid].visitas[agCod]=[];return DB[lid].visitas[agCod];}
function addVisita(){const ag=DB[lid].ags[agI];if(!DB[lid].visitas)DB[lid].visitas={};if(!DB[lid].visitas[ag.cod])DB[lid].visitas[ag.cod]=[];DB[lid].visitas[ag.cod].unshift(mkVisita());dbSave();render();}
function updVisita(agCod,vi,field,val){const vs=getVisitas(agCod);if(field.includes(".")){const[a,b]=field.split(".");vs[vi][a][b]=val;}else vs[vi][field]=val;dbSave();}
function updCheck(agCod,vi,key,val){getVisitas(agCod)[vi].check[key]=val;dbSave();}
function addAccionV(agCod,vi){getVisitas(agCod)[vi].acciones.push({tema:"",decision:"",accion:"",responsable:"",fecha:"",estado:"Pendiente"});dbSave();render();}
function updAccionV(agCod,vi,ai,f,v){getVisitas(agCod)[vi].acciones[ai][f]=v;dbSave();}
function delAccionV(agCod,vi,ai){getVisitas(agCod)[vi].acciones.splice(ai,1);dbSave();render();}
function addCompr(agCod,vi){getVisitas(agCod)[vi].compromisos.push({compromiso:"",accion:"",estado:"Pendiente",evidencia:""});dbSave();render();}
function updCompr(agCod,vi,ci,f,v){getVisitas(agCod)[vi].compromisos[ci][f]=v;dbSave();}
function delCompr(agCod,vi,ci){getVisitas(agCod)[vi].compromisos.splice(ci,1);dbSave();render();}
function toggleVisita(agCod,vi){getVisitas(agCod)[vi].abierta=!getVisitas(agCod)[vi].abierta;render();}
function delVisita(agCod,vi){if(!confirm("¿Eliminar esta visita?"))return;getVisitas(agCod).splice(vi,1);dbSave();render();}
function updRitual(agCod,vi,f,v){getVisitas(agCod)[vi].ritual[f]=v;dbSave();}

// ══ MUTACIONES DIRECTOR ══
function updRetro(lid_r,field,val){
  if(!DB[lid_r].retro_director)DB[lid_r].retro_director={};
  if(!DB[lid_r].retro_director.actual)DB[lid_r].retro_director.actual=mkRetro();
  DB[lid_r].retro_director.actual[field]=val;
  dbSave();
}
function guardarRetro(lid_r){
  if(!DB[lid_r].retro_director)DB[lid_r].retro_director={};
  if(!DB[lid_r].retro_director.historial)DB[lid_r].retro_director.historial=[];
  const actual=DB[lid_r].retro_director.actual||mkRetro();
  actual.fecha_guardado=new Date().toISOString().slice(0,10);
  DB[lid_r].retro_director.historial.unshift({...actual});
  DB[lid_r].retro_director.actual=mkRetro();
  dbSave();render();
  alert("Retroalimentación guardada en el historial ✓");
}

  document.getElementById("app").innerHTML=h;
}

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:13px;font-weight:500">Acciones estratégicas</span><button class="btn btn-p btn-sm" onclick="addPlan()">+ Agregar</button></div>`;
  if(!plan.length)h+=`<div style="text-align:center;padding:1.5rem;background:#fafafa;border-radius:8px;color:#888">Sin acciones.</div>`;
  plan.forEach((item,i)=>{h+=`<div class="plan-item"><div class="grid3" style="margin-bottom:8px"><div class="field"><label>Objetivo</label><input type="text" value="${esc(item.obj)}" onchange="updPlan(${i},'obj',this.value)"></div><div class="field"><label>Acción</label><input type="text" value="${esc(item.accion)}" onchange="updPlan(${i},'accion',this.value)"></div><div class="field"><label>Responsable</label><input type="text" value="${esc(item.resp)}" onchange="updPlan(${i},'resp',this.value)"></div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end"><div class="field"><label>Fecha límite</label><input type="date" value="${esc(item.fecha)}" onchange="updPlan(${i},'fecha',this.value)"></div>
  <div class="field"><label>Avance: ${item.av}%</label><input type="range" min="0" max="100" step="5" value="${item.av}" oninput="updPlan(${i},'av',this.value);this.previousElementSibling.textContent='Avance: '+this.value+'%'"><div style="height:4px;background:#eee;border-radius:2px;overflow:hidden"><div style="height:4px;width:${item.av}%;background:${item.av>=80?"#1a5e20":item.av>=40?"#f57f17":"#c62828"}"></div></div></div>
  <div class="field"><label>Estado</label><select style="background:${cE[item.estado]||"#fff"}" onchange="updPlan(${i},'estado',this.value)">${["Pendiente","En progreso","Completado","Bloqueado"].map(s=>`<option${item.estado===s?" selected":""}>${s}</option>`).join("")}</select></div>
  <button class="btn-danger" onclick="delPlan(${i})">✕</button></div></div>`;});
  return h;
}

function renderIGIBox(){
  const ag=DB[lid]?.ags[agI];if(!ag)return;const{t,nv:n}=agSt(ag);const box=document.getElementById("igi-box");if(!box)return;
  box.style.background=n.bg;box.style.borderColor=n.c+"40";
  box.innerHTML=`<div style="font-size:11px;color:${n.c}">IGI Total</div><div style="font-size:26px;font-weight:500;color:${n.c}">${t||"—"}</div><div style="font-size:13px">${n.s} ${n.l}</div>`;
}

// ANÁLISIS IA
// ══════════════════════════════════════════════════════
function abrirModalIA(titulo,sub){
  document.getElementById("modal-ia-title").textContent=titulo;
  document.getElementById("modal-ia-sub").textContent=sub;
  document.getElementById("modal-ia-body").textContent="⏳ Generando análisis...";
  document.getElementById("modal-ia").style.display="flex";
}
async function llamarIA(prompt){
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:prompt}]})});
    const j=await r.json();
    return j.content?.map(c=>c.text||"").join("")||"Sin respuesta.";
  }catch{return"Error de conexión.";}
}

async function genInformeIA(tipo){
  const allS=LIDERES.map(l=>({...zonaSt(l.id),L:l}));
  const resumen=allS.map(s=>`${s.L.z} (${s.L.n}): IGI=${s.avg} E1=${s.e1} E2=${s.e2} E3=${s.e3} Fuertes=${s.f} Medias=${s.m} Débiles=${s.db} Visitas=${s.visitas_total} AccPend=${s.acciones_pend} Eval=${s.comp}%`).join("\n");
  const tAg=Object.values(AGENCIAS).reduce((a,z)=>a+z.length,0);
  let prompt="";
  if(tipo==="semanal"){
    abrirModalIA("⚡ Análisis Semanal IA","Red Ecuador · "+new Date().toLocaleDateString("es-EC"));
    prompt=`Eres director de operaciones de una red de joyerías/casas de empeño en Ecuador. Analiza el pulso semanal con estos datos de las 10 zonas (${tAg} agencias):\n\n${resumen}\n\nEjes: Capacidad Interna 40%, Condiciones Externas 25%, Tareas Operativas 35%. Escala 1-5.\n\nGenera un ANÁLISIS SEMANAL EJECUTIVO con exactamente estas secciones:\n\n📊 ESTADO DE LA RED (2-3 oraciones con el panorama general)\n\n🏆 ZONAS DESTACADAS (Top 3 con razón específica)\n\n🔴 ZONAS PRIORITARIAS (Las que necesitan atención urgente esta semana, con causa y acción concreta)\n\n⚡ 3 ACCIONES INMEDIATAS (Lo más importante que debe hacer el Director esta semana, con responsable y plazo)\n\n📋 AGENDA SUGERIDA para la reunión del jueves (3 puntos clave a tratar)\n\nSé directo, usa los nombres de zona, y que cada recomendación sea accionable en 7 días.`;
  } else {
    abrirModalIA("📋 Informe Mensual Estratégico IA","Red Ecuador · "+new Date().toLocaleDateString("es-EC",{month:"long",year:"numeric"}));
    prompt=`Eres director de estrategia de una red de joyerías/casas de empeño en Ecuador. Genera el INFORME MENSUAL ESTRATÉGICO completo con datos de 10 zonas (${tAg} agencias):\n\n${resumen}\n\nEjes: Capacidad Interna 40%, Condiciones Externas 25%, Tareas Operativas 35%. Escala 1-5. Débil<2.5, Media 2.5-4, Fuerte≥4.\n\nGenera informe con estas secciones:\n\n📊 RESUMEN EJECUTIVO (Estado general de la red, IGI promedio, tendencia)\n\n🔍 ANÁLISIS POR EJE (¿Qué eje es más débil en la red? ¿Por qué? ¿Qué implica?)\n\n🗺️ ANÁLISIS POR REGIÓN (Patrones geográficos o por zona que llamen la atención)\n\n🏆 RECONOCIMIENTOS (Top 3 zonas con mejor desempeño y por qué)\n\n⚠️ ZONAS CRÍTICAS (Las que más preocupan con plan de rescate específico)\n\n🎯 PLAN DE ACCIÓN MENSUAL (5 iniciativas estratégicas con responsable, plazo e indicador de éxito)\n\n📈 METAS SUGERIDAS para el próximo mes (IGI objetivo por zona débil)\n\nSé estratégico, profundo y usa los nombres reales de zona y líder.`;
  }
  const resp=await llamarIA(prompt);
  document.getElementById("modal-ia-body").textContent=resp;
}

async function genRetroIA(lid_r){
  const L=LIDERES.find(l=>l.id===lid_r);const zs=zonaSt(lid_r);
  const data=DB[lid_r];
  const resAgs=data.ags.map(ag=>{const{p1,p2,p3,t,nv:n}=agSt(ag);return`[${ag.cod}] ${ag.nom}: IGI=${t} Nivel=${n.l} E1=${p1} E2=${p2} E3=${p3}`;}).join("\n");
  abrirModalIA("✨ Sugerencia de Retroalimentación IA",`Para ${L.n} — ${L.z}`);
  const prompt=`Eres director de zona. Necesitas dar retroalimentación constructiva y motivadora a ${L.n}, líder de ${L.z}. Datos de su zona:\n\nIGI: ${zs.avg} | Fuertes: ${zs.f} | Medias: ${zs.m} | Débiles: ${zs.db} | Visitas: ${zs.visitas_total} | Completitud: ${zs.comp}%\n\nAgencias:\n${resAgs}\n\nEscribe una retroalimentación directa y equilibrada con:\n\n✅ FORTALEZAS (2-3 cosas concretas que está haciendo bien)\n🎯 OPORTUNIDADES (2-3 áreas específicas de mejora con los datos que lo sustentan)\n📌 LO QUE LE PIDO (2-3 compromisos concretos para el próximo mes)\n📈 META IGI (número específico que debería alcanzar el próximo mes, justificado)\n\nTono: directo, constructivo, sin rodeos. Como un buen director que confía en su líder.`;
  const resp=await llamarIA(prompt);
  document.getElementById("modal-ia-body").textContent=resp;
}

async function genAgendaIA(){
  const allS=LIDERES.map(l=>({...zonaSt(l.id),L:l}));
  const criticas=allS.filter(s=>s.avg>0&&s.avg<2.5).map(s=>s.L.z).join(", ")||"ninguna";
  const sinVisitas=allS.filter(s=>s.visitas_total===0).map(s=>s.L.z).join(", ")||"ninguna";
  const accTotal=allS.reduce((a,s)=>a+s.acciones_pend,0);
  abrirModalIA("📅 Agenda IA para Reunión Virtual","Generando agenda personalizada...");
  const prompt=`Eres director de una red de joyerías. Genera la agenda para la reunión virtual semanal de 45 minutos con los 10 líderes zonales.\n\nContexto actual:\n- Zonas críticas (IGI<2.5): ${criticas}\n- Zonas sin visitas registradas: ${sinVisitas}\n- Acciones pendientes en la red: ${accTotal}\n- Total zonas: 10 | Total agencias: 101\n\nGenera una AGENDA EJECUTIVA con:\n1. Estructura minuto a minuto (5 bloques)\n2. Preguntas específicas que el director debe hacer\n3. Punto de reconocimiento (quién y por qué)\n4. Punto crítico a resolver (con datos)\n5. Compromisos que se deben tomar al cerrar\n6. Frase de cierre motivadora\n\nQue sea práctica, sin relleno, para un director ocupado.`;
  const resp=await llamarIA(prompt);
  document.getElementById("modal-ia-body").textContent=resp;
}

async function openDiag(id){
  const L=LIDERES.find(l=>l.id===id);const data=DB[id];
  abrirModalIA("Diagnóstico IA",`${L.z} · ${L.n}`);
  const res=data.ags.map(ag=>{const{p1,p2,p3,t,nv:n}=agSt(ag);return`[${ag.cod}] ${ag.nom}: IGI=${t} Nivel=${n.l} E1=${p1} E2=${p2} E3=${p3}${ag.accion?" | Acción: "+ag.accion:""}`;}).join("\n");
  const prompt=`Diagnóstico de ${L.z} (${L.n}) Ecuador. Visitas: ${zonaSt(id).visitas_total}.\n\n${res}\n\nEjes: Cap.Interna 40%, Externas 25%, Tareas 35%. Escala 1-5.\n1. RESUMEN EJECUTIVO\n2. FORTALEZAS (máx 3)\n3. BRECHAS CRÍTICAS (con códigos)\n4. RECOMENDACIONES (3 con plazo)\n5. AGENCIAS PRIORITARIAS\n6. META IGI`;
  const resp=await llamarIA(prompt);
  document.getElementById("modal-ia-body").textContent=resp;
}

function verHistorialRetro(lid_r){
  const L=LIDERES.find(l=>l.id===lid_r);const historial=DB[lid_r]?.retro_director?.historial||[];
  abrirModalIA(`Historial de Retroalimentaciones`,`${L.z} · ${L.n} — ${historial.length} registro(s)`);
  if(!historial.length){document.getElementById("modal-ia-body").textContent="Sin historial aún.";return;}
  const texto=historial.map((r,i)=>`─── Retroalimentación #${i+1} — ${r.fecha_guardado||r.fecha} ───\n✅ Fortalezas: ${r.fortalezas||"—"}\n🎯 Oportunidades: ${r.oportunidades||"—"}\n📌 Me pide: ${r.compromisos_dir||"—"}\n📈 Meta IGI: ${r.meta_igi||"—"}`).join("\n\n");
  document.getElementById("modal-ia-body").textContent=texto;
}
